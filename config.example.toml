# --- ОБЩИЕ НАСТРОЙКИ ---
url = "ВАША_ССЫЛКА_НА_ФОРМУ"
department = "ВАШ_ОТДЕЛ"
employee_name = "ВАШЕ_ИМЯ"
# Режим отладки: если true, то финальная кнопка "Отправить" не нажимается, а в логах пишется время выполнения шагов
debug = true

# --- НАСТРОЙКИ БРАУЗЕРА ---
# browser_mode: "local" (локальный запуск) или "remote" (удаленный через browserless.io)
browser_mode = "local"
# Токен для авторизации на browserless.io
browserless_token = "ВАШ_ТОКЕН_BROWSERLESS"
# Адрес подключения к browserless.io. По умолчанию используется глобальный балансировщик.
browserless_endpoint = "wss://chrome.browserless.io"
# Записывать сессию для просмотра в дашборде browserless.io (требует платного плана)
session_replay = false

# --- НАСТРОЙКИ TELEGRAM БОТА ---
[telegram]
token = "ВАШ_ТОКЕН_БОТА"
# Список разрешенных Telegram Chat ID. Если пуст, первый пользователь, отправивший /start,
# будет автоматически зарегистрирован как владелец.
allowed_chat_ids = []
